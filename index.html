<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strongest Earthquake 48H</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

#quakeBar {
    display: inline-flex;
    align-items: center;
    gap: 15px;
    background: rgba(0,0,0,0.7);
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    font-size: 28px;
}

/* label */
.label {
    opacity: 0.8;
}

/* magnitude box (fialová) */
.magnitude {
    background: #7b3fe4;
    padding: 8px 16px;
    border-radius: 10px;
    font-weight: bold;
    animation: pulse 2.5s infinite;
}

/* location */
.location {
    font-weight: bold;
}

/* time box (biely badge ako v pôvodnom) */
.timebox {
    background: white;
    color: black;
    padding: 8px 16px;
    border-radius: 12px;
    font-weight: bold;
}

/* jemný pulz */
@keyframes pulse {
    0%   { box-shadow: 0 0 0px rgba(123,63,228,0.4); }
    50%  { box-shadow: 0 0 12px rgba(123,63,228,0.7); }
    100% { box-shadow: 0 0 0px rgba(123,63,228,0.4); }
}
</style>
</head>

<body>

<div id="quakeBar">
    <div class="label">STRONGEST EARTHQUAKE LAST 48H</div>
    <div class="magnitude" id="mag">--</div>
    <div class="location" id="loc">Loading...</div>
    <div class="timebox" id="time">--</div>
</div>

<script>
let quakeTime = null;

async function loadQuake() {
    try {
        const now = Date.now();
        const cutoff = now - (48 * 60 * 60 * 1000);

        const [dayRes, weekRes] = await Promise.all([
            fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson"),
            fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_week.geojson")
        ]);

        const dayData = await dayRes.json();
        const weekData = await weekRes.json();

        const all = [...dayData.features, ...weekData.features];
        const unique = {};
        all.forEach(q => unique[q.id] = q);
        const quakes = Object.values(unique);

        const last48h = quakes.filter(q => q.properties.time >= cutoff);

        let strongest = null;

        last48h.forEach(q => {
            if (!strongest || q.properties.mag > strongest.properties.mag) {
                strongest = q;
            }
        });

        if (strongest) {
            document.getElementById("mag").innerText = strongest.properties.mag.toFixed(1);
            document.getElementById("loc").innerText = strongest.properties.place;
            quakeTime = strongest.properties.time;
        }

    } catch (e) {
        document.getElementById("loc").innerText = "Error";
    }
}

function updateTimeAgo() {
    if (!quakeTime) return;

    const diff = Date.now() - quakeTime;

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("time").innerText =
        hours + "h " + minutes + "m ago";
}

// init
loadQuake();

// refresh dát
setInterval(loadQuake, 300000);

// live time ago
setInterval(updateTimeAgo, 1000);
</script>

</body>
</html>
